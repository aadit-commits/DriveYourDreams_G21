<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Car Rental & Selling - Signup/Login</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Animations */
        @keyframes slideInCar {
            from {
                background-position-x: -1000px;
            }
            to {
                background-position-x: center;
            }
        }

        @keyframes fadeInPopup {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url(vecteezy_car-or-bike-smokie-background-realistic-photo-ai-generative_27533474.jpg);
            background-size: 1600px 800px;
            background-repeat: no-repeat;
            background-position: center;
            animation: slideInCar 2s ease-out forwards;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            background: transparent;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            animation: fadeInPopup 1.5s ease-out forwards;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #f5f2f2;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input[type="text"], input[type="email"], input[type="password"] {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }

        .toggle-link {
            text-align: center;
            margin-top: 10px;
            color: #007BFF;
            cursor: pointer;
            user-select: none;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .container {
                width: 95%;
                padding: 15px;
            }

            input[type="text"], input[type="email"], input[type="password"] {
                font-size: 14px;
            }

            button {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="form-title">Login</h2>
        <form id="auth-form">
            <input type="email" id="email" placeholder="Email" required />
            <input type="password" id="password" placeholder="Password" required />
            <div class="error" id="error-msg"></div>
            <button type="submit" id="submit-btn">Login</button>
        </form>
        <div class="toggle-link" id="toggle-link">Don't have an account? Sign up</div>
    </div>

    <script>
        const formTitle = document.getElementById('form-title');
        const authForm = document.getElementById('auth-form');
        const toggleLink = document.getElementById('toggle-link');
        const errorMsg = document.getElementById('error-msg');

        let isLogin = true;

        toggleLink.addEventListener('click', () => {
            isLogin = !isLogin;
            errorMsg.textContent = '';
            if (isLogin) {
                formTitle.textContent = 'Login';
                toggleLink.textContent = "Don't have an account? Sign up";
                authForm.innerHTML = `
                    <input type="email" id="email" placeholder="Email" required />
                    <input type="password" id="password" placeholder="Password" required />
                    <div class="error" id="error-msg"></div>
                    <button type="submit" id="submit-btn">Login</button>
                `;
            } else {
                formTitle.textContent = 'Sign Up';
                toggleLink.textContent = 'Already have an account? Login';
                authForm.innerHTML = `
                    <input type="text" id="name" placeholder="Full Name" required />
                    <input type="email" id="email" placeholder="Email" required />
                    <input type="password" id="password" placeholder="Password" required />
                    <div class="error" id="error-msg"></div>
                    <button type="submit" id="submit-btn">Sign Up</button>
                `;
            }
            attachFormListener();
        });

        function attachFormListener() {
            const form = document.getElementById('auth-form');
            const errorDiv = form.querySelector('.error');
            form.addEventListener('submit', function(event) {
                event.preventDefault();
                errorDiv.textContent = '';

                const email = form.querySelector('#email').value.trim();
                const password = form.querySelector('#password').value.trim();

                if (!validateEmail(email)) {
                    errorDiv.textContent = 'Please enter a valid email address.';
                    return;
                }

                if (password.length < 6) {
                    errorDiv.textContent = 'Password must be at least 6 characters long.';
                    return;
                }

                if (!isLogin) {
                    const name = form.querySelector('#name').value.trim();
                    if (name.length < 3) {
                        errorDiv.textContent = 'Name must be at least 3 characters long.';
                        return;
                    }
                    alert('Sign up successful! You can now log in.');
                    toggleLink.click();
                } else {
                    alert('Login successful! Welcome back.');
                }
            });
        }

        function validateEmail(email) {
            const re = /^(([^<>()[\]\\.,;:\s@\"]+(\.[^<>()[\]\\.,;:\s@\"]+)*)|(\".+\"))@(([^<>()[\]\\.,;:\s@\"]+\.)+[^<>()[\]\\.,;:\s@\"]{2,})$/i;
            return re.test(String(email).toLowerCase());
        }

        attachFormListener();
    </script>
</body>
</html>
